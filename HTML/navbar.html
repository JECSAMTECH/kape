<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Font Sora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <!-- Font Nunito Rounded -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/navbar.css">
    <title>KAPE</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand" href=""><img class="logo" src="../assets/images/LogoKápe_sinFondo.png"
                    alt="Logo"></a>
            <!-- Menu -->
            <ul class="menu navbar-nav">
                <li class="nav-item px-2" id="inicio"><a href="">Inicio</a></li>
                <li class="nav-item px-2"><a href="">Catálogo</a></li>
                <li class="nav-item px-2"><a href="">Contáctanos</a></li>
                <li class="nav-item px-2"><a href="">Nosotros</a></li>
            </ul>
            <!-- Barra de busqueda / Modal -->
            <div id="modal" class="modal fade" tabindex="-1">
                <div class="modal-dialog">
                    <div id="modalBody" class="modal-content">
                        <div class="modal-body">
                            <form id="contenedor">
                                <input class="entrada col-9" type="search" placeholder="Busca tu Kape">
                                <button type="button" class="btn botonNav"><svg xmlns="http://www.w3.org/2000/svg"
                                        width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                        class="lucide lucide-coffee-icon lucide-coffee">
                                        <path d="M10 2v2" />
                                        <path d="M14 2v2" />
                                        <path
                                            d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1" />
                                        <path d="M6 2v2" />
                                    </svg>Buscar
                                </button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>


            <div>
                <!-- Botón de búsqueda -->
                <button id=btnBuscar class="btn botonNav" data-bs-toggle="modal" data-bs-target="#modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-search-icon lucide-search">
                        <path d="m21 21-4.34-4.34" />
                        <circle cx="11" cy="11" r="8" />
                    </svg>
                </button>

                <!-- Botón de carrito -->
                <a class="btn botonNav">
                    <span>0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-shopping-cart-icon lucide-shopping-cart">
                        <circle cx="8" cy="21" r="1" />
                        <circle cx="19" cy="21" r="1" />
                        <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" />
                    </svg>
                </a>
                <!-- Botón de usuario -->
                <a class="btn botonNav">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-user-round-icon lucide-user-round">
                        <circle cx="12" cy="8" r="5" />
                        <path d="M20 21a8 8 0 0 0-16 0" />
                    </svg>
                </a>

            </div>

        </div>
    </nav>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Conexión con el JS de la navbar-->
    <script src="../JS/navbar.js"></script>
</body>

</html>
