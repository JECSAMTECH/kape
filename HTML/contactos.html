<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <!--BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!--ESTILOS LETRAS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Títulos Sora-->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <!--Texto Poppins-->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!--Botones: Nunito Rounded-->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
        <!--Pendiente pantalla responsivo-->



</head>

<body>
    <!--NAV BAR-->

    <!--SECCION CONTACTANOS-->
    <main>
        <div class="container py-4 my-4">
            <h1 class="text-center display-4 fw-bold mb-3 h1">Contáctanos</h1>
            <p class="text-center texto">¿Tienes preguntas sobre nuestros granos artesanales o quieres colaborar?
                Estamos aquí para escucharte y compartir nuestra pasión por el café.</p>
        </div>

        <div class="container rounded-4" style="max-width: 800px;">
            <div class="container p-4 rounded-4 text-start formulario" style="background-color: #F8F5EF;">
                <form>
                    <!--Nombre-->
                    <div class="mb-3">
                        <label class="form-label  fw-bold" style="color: #8F4A2C; font-family: 'Poppins';">Nombre</label>
                        <input type="email" class="form-control" style="border-color: #D8C7A1; font-family: 'Poppins';"
                        placeholder="Tu nombre completo">
                    </div>

                    <!--Correo electronico-->
                    <div class="mb-3">
                        <label class="form-label  fw-bold" style="color: #8F4A2C; font-family: 'Poppins';">Correo electrónico</label>
                        <input type="email" class="form-control" style="border-color: #D8C7A1; font-family: 'Poppins';"
                        placeholder="ejemplo@gmail.com">
                    </div>

                    <!--Telefono-->
                    <div class="mb-3">
                        <label class="form-label  fw-bold" style="color: #8F4A2C; font-family: 'Poppins';">Teléfono</label>
                        <input type="email" class="form-control" style="border-color: #D8C7A1; font-family: 'Poppins';"
                        placeholder="Ingresa 10 digitos">
                    </div>

                    <!--Asunto-->
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #8F4A2C; font-family: 'Poppins';">Asunto</label>
                        <textarea class="form-control rounded-3" rows="3"
                            style="border-color: #D8C7A1; font-family: 'Poppins';"
                            placeholder="¿En qué podemos ayudarte?"></textarea></textarea>
                    </div>

                    <!--Mensaje-->
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #8F4A2C; font-family: 'Poppins';">Mensaje</label>
                        <textarea class="form-control rounded-3" rows="5"
                            style="border-color: #D8C7A1; font-family: 'Poppins';"
                            placeholder="Escribe tu mensaje aquí..."></textarea></textarea>
                    </div>

                    <div class="text-center w-100 mt-3">
                        <!-- Botón de enviar formulario -->
                        <button type="submit" class="btn text-white fw-semibold rounded-3 px-5 py-2 border-0"
                            style="background-color: #7A1F2D; font-family: 'Nunito Rounded', sans-serif;">
                            Enviar Mensaje
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <!--FOOTER-->
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
